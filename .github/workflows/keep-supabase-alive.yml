name: Keep Supabase Alive

on:
  schedule:
    # Roda todos os dias à meia-noite
    - cron: "0 0 * * *" 
  workflow_dispatch: # Permite rodar manualmente clicando em um botão no GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/contadores?select=*&limit=1' \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"